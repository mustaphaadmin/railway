name: Actualizar M3U8 de M24TV

on:
  # Ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:
  
  # Ejecutar automáticamente cada 3 horas
  schedule:
    - cron: '0 */3 * * *'

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar yt-dlp
        run: pip install yt-dlp
      
      - name: Obtener enlace m3u8 de M24TV
        run: |
          yt-dlp -g https://www.youtube.com/watch?v=qdXiGvwyUkA > m24tv.m3u8
          echo "✅ Enlace actualizado el $(date)" >> m24tv.m3u8
      
      - name: Verificar que se obtuvo el enlace
        run: |
          if [ -s m24tv.m3u8 ]; then
            echo "✓ Archivo generado correctamente"
            head -n 1 m24tv.m3u8
          else
            echo "❌ Error: No se pudo obtener el enlace"
            exit 1
          fi
      
      - name: Guardar cambios en GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add m24tv.m3u8
          git commit -m "Actualizar enlace M24TV - $(date +'%Y-%m-%d %H:%M:%S')" || echo "Sin cambios"
          git push
