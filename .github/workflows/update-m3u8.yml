name: Actualizar M3U8 de M24TV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar yt-dlp
        run: pip install yt-dlp
      
      - name: Obtener enlace m3u8 usando cookies
        run: |
          # Usar las cookies que subiste
          yt-dlp --cookies cookies.txt -g https://www.youtube.com/watch?v=qdXiGvwyUkA > m24tv.m3u8
          echo "✅ Actualizado: $(date)" >> m24tv.m3u8
      
      - name: Verificar resultado
        run: |
          if [ -s m24tv.m3u8 ]; then
            echo "✓ Enlace obtenido correctamente"
            head -n 1 m24tv.m3u8
          else
            echo "❌ Error: No se generó el enlace"
            exit 1
          fi
      
      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add m24tv.m3u8
          git commit -m "Actualizar M24TV - $(date +'%Y-%m-%d %H:%M:%S')" || echo "Sin cambios"
          git push
